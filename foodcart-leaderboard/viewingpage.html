<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Food Truck Leaderboard – Reviews</title>
    <link rel="stylesheet" href="vw2copy.css">
  </head>

  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      function ViewingPage() {
        return (
          <div id="viewing-container">
            <h1>This is the viewing section. View other reviews here!</h1>

            <p className="new-post">
              <span className="badge">New</span>
              [USER] has posted []
            </p>

            <ul className="review-list">
              <li className="review-item">
                <div className="review-meta">
                  Posted by <strong>[USER]</strong> · 2h ago
                </div>
                <div className="review-body">
                  This is a example review…
                </div>
              </li>
            </ul>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<ViewingPage />);
    </script>
  </body>
</html>
