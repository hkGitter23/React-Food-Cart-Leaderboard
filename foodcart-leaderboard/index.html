<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Truck Search</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h1>Food Truck Finder</h1>
    <p>Use the search bar to locate specific dish types!</p>
  </header>

  <section class="search-section">
    <input type="text" id="searchInput" placeholder="Search for a dish..." onkeyup="filterDishes()">
  </section>

  <section class="dish-list">
    <ul id="dishList">
      <li>Tacos</li>
      <li>BBQ Ribs</li>
      <li>Cheeseburger</li>
      <li>Falafel</li>
      <li>Pizza</li>
      <li>Burrito</li>
      <li>Sushi Roll</li>
      <li>Grilled Cheese</li>
      <li>Fried Chicken</li>
    </ul>
  </section>

  <script src="script.js"></script>
</body>
</html>
